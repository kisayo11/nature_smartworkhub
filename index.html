<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NatureHospital SmartWork Hub</title>
    <!-- 파비콘 -->
    <link rel="icon" href="logo.png" type="image/png">
    
    <!-- Pretendard Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
    
    <!-- Iconify Solar -->
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    
    <!-- Tailwind CSS (Supanova SaaS Premium) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#F8F9FA',
                            zinc: '#09090b',
                            gray: '#404040',
                            yellow: '#F3E5AB',
                            green: '#86A789',
                            mint: '#B2C8BA',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'blob': 'blob 10s infinite',
                        'blob-reverse': 'blob-reverse 12s infinite',
                        'particle-float': 'particleFloat 15s linear infinite',
                        'morph': 'morph 8s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        'blob-reverse': {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(-30px, 50px) scale(1.2)' },
                            '66%': { transform: 'translate(20px, -20px) scale(0.8)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        particleFloat: {
                            '0%': { transform: 'translateY(100vh) rotate(0deg)', opacity: '0' },
                            '10%': { opacity: '0.6' },
                            '90%': { opacity: '0.6' },
                            '100%': { transform: 'translateY(-20vh) rotate(360deg)', opacity: '0' },
                        },
                        morph: {
                            '0%, 100%': { borderRadius: '60% 40% 30% 70%/60% 30% 70% 40%' },
                            '50%': { borderRadius: '30% 60% 70% 40%/50% 60% 30% 60%' }
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-brand-bg text-zinc-900 font-sans antialiased min-h-[100dvh] overflow-hidden flex break-keep-all relative text-base selection:bg-brand-green/20">
    
    <!-- Supanova Aurora & Particles Dynamic Background -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden flex items-center justify-center">
        <!-- Morphing Gradient Blobs -->
        <div class="absolute top-[0%] right-[-5%] w-[50vw] h-[50vw] max-w-[800px] max-h-[800px] bg-gradient-to-tr from-brand-mint/40 to-brand-green/10 blur-[90px] mix-blend-multiply opacity-80 animate-morph" style="animation-duration: 15s;"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-[45vw] h-[45vw] max-w-[700px] max-h-[700px] bg-gradient-to-bl from-brand-yellow/40 to-white/10 blur-[100px] mix-blend-multiply opacity-70 animate-morph" style="animation-delay: -5s; animation-duration: 18s;"></div>
        <div class="absolute top-[40%] left-[25%] w-[35vw] h-[35vw] max-w-[500px] max-h-[500px] bg-gradient-to-br from-brand-mint/20 to-brand-green/10 blur-[80px] mix-blend-overlay opacity-60 animate-morph" style="animation-delay: -10s; animation-duration: 20s;"></div>

        <!-- Floating Animated Particles (SVGs) -->
        <div class="absolute inset-0 z-0 opacity-80">
            <!-- Sparkles & Geometry -->
            <svg class="absolute left-[10%] top-[80%] text-brand-mint/50 w-10 h-10 animate-particle-float" style="animation-duration: 25s; animation-delay: 0s" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15 10L22 12L15 14L12 22L9 14L2 12L9 10L12 2Z" fill="currentColor"/></svg>
            <svg class="absolute left-[80%] top-[90%] text-brand-yellow/40 w-14 h-14 animate-particle-float" style="animation-duration: 18s; animation-delay: 3s" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 4"/></svg>
            <svg class="absolute left-[40%] top-[70%] text-brand-green/30 w-8 h-8 animate-particle-float" style="animation-duration: 22s; animation-delay: 7s" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="5" width="14" height="14" rx="3" transform="rotate(25 12 12)" stroke="currentColor" stroke-width="1.5"/></svg>
            <svg class="absolute left-[65%] top-[85%] text-brand-mint/40 w-6 h-6 animate-particle-float" style="animation-duration: 20s; animation-delay: 11s" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15 10L22 12L15 14L12 22L9 14L2 12L9 10L12 2Z" fill="currentColor"/></svg>
            <svg class="absolute left-[20%] top-[95%] text-brand-yellow/30 w-12 h-12 animate-particle-float" style="animation-duration: 28s; animation-delay: 5s" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            <svg class="absolute left-[85%] top-[60%] text-brand-green/20 w-16 h-16 animate-particle-float" style="animation-duration: 24s; animation-delay: 14s" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4,12 C4,16 8,20 12,20 C16,20 20,16 20,12 C20,8 16,4 12,4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
    </div>
    
    <!-- Noise Texture Overlay for Premium feel -->
    <div class="fixed inset-0 z-[5] pointer-events-none opacity-[0.03]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.85%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
    
    <!-- Dashboard Layout -->
    <div class="flex h-[100dvh] w-full relative z-10">
        
        <!-- Sidebar Navigation (Glassmorphism Sidebar) -->
        <aside id="sidebar" class="w-[280px] flex-shrink-0 flex flex-col bg-white/60 backdrop-blur-xl border-r border-white/80 shadow-[1px_0_30px_rgba(0,0,0,0.02)] transition-all duration-500 ease-out z-40 max-md:fixed max-md:-left-full max-md:top-0 max-md:bottom-0 max-md:w-full max-md:max-w-[280px] max-md:shadow-2xl">
            <div class="h-28 px-8 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-brand-green to-brand-mint text-white flex items-center justify-center text-2xl shadow-[0_8px_16px_rgba(134,167,137,0.3)] shadow-inner border border-white/20 flex-shrink-0">
                        <iconify-icon icon="solar:leaf-bold-duotone"></iconify-icon>
                    </div>
                    <div>
                        <h1 class="text-[1.1rem] font-extrabold tracking-tight text-zinc-900 leading-none mb-1 shadow-sm">네이처요양병원</h1>
                        <span class="text-[0.65rem] font-bold uppercase tracking-[0.15em] text-brand-green">Smart Work Hub</span>
                    </div>
                </div>
                <button id="mobile-close" class="hidden max-md:flex text-zinc-400 hover:text-zinc-700 transition-colors p-2 rounded-lg hover:bg-black/5"><iconify-icon icon="solar:close-circle-bold-duotone" class="text-2xl"></iconify-icon></button>
            </div>

            <div class="flex-1 overflow-y-auto px-6 py-4 custom-scrollbar">
                <div class="mb-4 text-[0.65rem] font-bold text-zinc-400 tracking-[0.15em] uppercase px-3">Categories</div>
                <ul id="category-nav" class="flex flex-col gap-1.5">
                    <!-- Loaded by JS -->
                </ul>
            </div>

            <div class="px-8 py-4 text-center">
                <div class="text-[0.6rem] font-bold tracking-[0.2em] text-zinc-300">BUILT BY KISAYO</div>
            </div>

            <div class="p-6">
                <button id="admin-login-btn" class="w-full flex items-center justify-center gap-3 px-4 py-3.5 rounded-2xl text-zinc-600 font-bold bg-white/50 border border-white hover:bg-white hover:shadow-[0_8px_20px_rgba(0,0,0,0.04)] transition-all duration-300 active:scale-[0.98]">
                    <iconify-icon icon="solar:widget-add-bold-duotone" class="text-xl"></iconify-icon>
                    <span class="text-[0.9rem]">시스템 관리</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col min-w-0 relative">
            
            <!-- Top Header Glass -->
            <header class="h-28 flex items-center justify-between px-8 lg:px-16 flex-shrink-0 z-30 transition-all duration-300">
                <div class="flex items-center gap-6 flex-1">
                    <button id="mobile-menu-btn" class="hidden max-md:flex text-zinc-600 p-2 -ml-2 rounded-full hover:bg-white/50 border border-transparent hover:border-white transition-all shadow-sm"><iconify-icon icon="solar:hamburger-menu-line-duotone" class="text-2xl"></iconify-icon></button>
                    
                    <div class="relative w-full max-w-md group">
                        <iconify-icon icon="solar:magnifer-linear" class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400 text-xl transition-colors group-focus-within:text-brand-green z-10"></iconify-icon>
                        <input type="text" id="search-input" placeholder="시스템 통합 검색..." autocomplete="off" class="w-full bg-white/60 backdrop-blur-md border border-white rounded-full py-3.5 pl-14 pr-16 text-[0.95rem] font-medium text-zinc-900 placeholder:text-zinc-400 focus:outline-none focus:ring-[3px] focus:ring-brand-green/20 focus:border-brand-green/30 focus:bg-white shadow-[0_4px_12px_rgba(0,0,0,0.02)] transition-all duration-300">
                        <div class="absolute right-3 top-1/2 -translate-y-1/2 bg-zinc-100 border border-zinc-200 rounded-full px-2.5 py-1 text-[0.6rem] font-bold text-zinc-500 pointer-events-none hidden md:block tracking-widest uppercase">Ctrl K</div>
                    </div>
                </div>

                <div class="hidden md:flex items-center gap-10">
                    <div class="flex flex-col items-end">
                        <div id="current-time" class="text-[1.3rem] font-extrabold text-zinc-800 tracking-tight leading-none mb-1 drop-shadow-sm">00:00</div>
                        <div id="current-date" class="text-[0.75rem] font-bold text-brand-green tracking-widest uppercase">YYYY.MM.DD</div>
                    </div>
                </div>
            </header>

            <!-- Scrollable Grid Context -->
            <div class="flex-1 overflow-y-auto px-8 py-4 lg:px-16 lg:py-6 custom-scrollbar scroll-smooth">
                <div class="max-w-[1400px] mx-auto w-full">
                    
                    <div class="mb-14 animate-fade-in-up flex justify-between items-end gap-4 flex-wrap">
                        <div>
                            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-green/10 border border-brand-green/20 text-brand-green text-[0.7rem] font-bold tracking-widest uppercase mb-4">
                                <iconify-icon icon="solar:stars-minimalistic-bold-duotone"></iconify-icon> Workspace Hub
                            </div>
                            <h2 id="current-category-title" class="text-4xl md:text-5xl lg:text-[3.5rem] font-extrabold text-zinc-900 tracking-tighter leading-tight drop-shadow-sm">전체 시스템</h2>
                        </div>
                    </div>

                    <!-- Loading State -->
                    <div id="loading" class="flex flex-col items-center justify-center py-32 animate-fade-in-up">
                        <div class="w-20 h-20 rounded-[1.5rem] bg-white shadow-[0_10px_30px_rgba(0,0,0,0.05)] border border-white flex items-center justify-center mb-6 animate-float">
                            <iconify-icon icon="solar:cpu-bolt-bold-duotone" class="text-5xl text-brand-green animate-pulse"></iconify-icon>
                        </div>
                        <p class="font-bold tracking-wide text-zinc-500 text-lg">워크스페이스 동기화 중...</p>
                    </div>

                    <!-- Apps Grid (CSS Grid without auto-rows-max so it stretches evenly!) -->
                    <div id="apps-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        <!-- Cards injected by JS -->
                    </div>
                </div>
                
                <div class="h-24 w-full"></div>
            </div>
        </main>
    </div>

    <!-- Admin Login Modal Glassmorphic -->
    <div id="login-modal" class="hidden fixed inset-0 z-[100] items-center justify-center p-4 transition-all duration-300 opacity-0 data-[show=true]:opacity-100 data-[show=true]:flex">
        <div class="absolute inset-0 bg-zinc-900/40 backdrop-blur-sm" onclick="closeModal('login-modal')"></div>
        <div class="bg-white/80 backdrop-blur-xl rounded-[2.5rem] p-12 w-full max-w-md shadow-[0_40px_80px_rgba(0,0,0,0.1)] border border-white flex flex-col relative transform scale-95 transition-transform duration-300 data-[show=true]:scale-100 z-10">
            <button onclick="closeModal('login-modal')" class="absolute top-6 right-6 text-zinc-400 hover:text-zinc-800 transition-colors p-2 rounded-full"><iconify-icon icon="solar:close-circle-bold-duotone" class="text-3xl"></iconify-icon></button>
            
            <div class="w-20 h-20 rounded-[1.5rem] bg-gradient-to-br from-brand-zinc to-zinc-700 text-white flex items-center justify-center text-4xl mb-8 border border-white shadow-xl shadow-zinc-900/20">
                <iconify-icon icon="solar:shield-keyhole-bold-duotone"></iconify-icon>
            </div>
            <h2 class="text-3xl font-extrabold tracking-tight text-zinc-900 mb-3">인증 요구됨</h2>
            <p class="text-[0.95rem] text-zinc-500 mb-10 leading-relaxed font-medium">관리자 전용 대시보드에 접근하기 위한<br>마스터 암호를 입력하세요.</p>
            
            <div class="mb-8 relative">
                <iconify-icon icon="solar:lock-password-linear" class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400 text-xl"></iconify-icon>
                <input type="password" id="admin-password" placeholder="Passcode" onkeypress="if(event.key === 'Enter') loginAdmin()" class="w-full bg-white/60 border border-zinc-200 rounded-[1.5rem] px-5 py-4 pl-14 text-[1.1rem] text-zinc-900 focus:outline-none focus:ring-4 focus:ring-zinc-900/10 focus:border-zinc-900 transition-all placeholder:text-zinc-400 font-mono tracking-widest shadow-inner">
            </div>
            
            <button onclick="loginAdmin()" class="w-full rounded-[1.5rem] bg-zinc-900 text-white font-bold py-5 px-8 flex items-center justify-center gap-3 hover:bg-black transition-all duration-300 hover:-translate-y-1 shadow-[0_15px_30px_rgba(0,0,0,0.15)] active:scale-[0.98]">
                <span class="text-[1.05rem] tracking-wide">시스템 진입</span>
            </button>
        </div>
    </div>

    <!-- Admin Dashboard Modal -->
    <div id="admin-dashboard-modal" class="hidden fixed inset-0 z-[100] items-center justify-center p-4 lg:p-8 transition-all duration-300 opacity-0 data-[show=true]:opacity-100 data-[show=true]:flex">
        <div class="absolute inset-0 bg-zinc-900/60 backdrop-blur-sm" onclick="closeModal('admin-dashboard-modal')"></div>
        <div class="bg-brand-bg rounded-[2.5rem] w-full max-w-[1200px] shadow-[0_40px_100px_rgba(0,0,0,0.2)] border border-white flex flex-col relative h-[90vh] max-h-[900px] overflow-hidden transform scale-95 transition-transform duration-300 data-[show=true]:scale-100 z-10">
            <div class="px-10 py-8 border-b border-zinc-200/60 flex justify-between items-center bg-white/70 backdrop-blur-md relative z-20">
                <div class="flex items-center gap-5">
                    <div class="w-14 h-14 rounded-2xl bg-brand-green/10 text-brand-green flex items-center justify-center text-2xl border border-brand-green/20">
                        <iconify-icon icon="solar:layers-bold-duotone"></iconify-icon>
                    </div>
                    <div>
                        <h2 class="text-2xl font-extrabold tracking-tight text-zinc-900 mb-1">통합 레지스트리 관리</h2>
                        <p class="text-[0.9rem] text-zinc-500 font-bold tracking-wide uppercase">Workspace Management / Admin</p>
                    </div>
                </div>
                <button onclick="closeModal('admin-dashboard-modal')" class="text-zinc-500 hover:text-zinc-900 transition-colors p-2 bg-white hover:bg-zinc-100 border border-zinc-200 rounded-full flex shadow-sm hover:scale-105 active:scale-95 duration-300">
                    <iconify-icon icon="solar:close-circle-bold-duotone" class="text-2xl"></iconify-icon>
                </button>
            </div>

            <div class="flex-1 flex flex-col min-h-0 bg-white/40">
                <div class="px-10 py-5 flex justify-between items-center border-b border-zinc-200/50">
                    <div id="admin-status" class="text-[0.9rem] font-bold"></div>
                    <button onclick="openAppForm()" class="rounded-full bg-zinc-900 text-white font-bold py-3.5 px-8 flex items-center gap-3 hover:bg-black transition-all duration-300 hover:shadow-[0_10px_20px_rgba(0,0,0,0.15)] hover:-translate-y-1 active:scale-[0.98]">
                        <iconify-icon icon="solar:add-square-bold-duotone" class="text-2xl"></iconify-icon> 새 시스템 배포
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto w-full custom-scrollbar p-8">
                    <table class="w-full text-left border-separate border-spacing-y-2">
                        <thead>
                            <tr>
                                <th class="px-6 py-3 font-extrabold text-zinc-400 uppercase tracking-widest text-[0.7rem] cursor-pointer hover:text-zinc-800 transition-colors rounded-l-xl" onclick="sortAdminTable('category')">분류 <iconify-icon id="icon-sort-category" icon="solar:sort-vertical-linear" class="ml-1"></iconify-icon></th>
                                <th class="px-6 py-3 font-extrabold text-zinc-400 uppercase tracking-widest text-[0.7rem] cursor-pointer hover:text-zinc-800 transition-colors w-1/3" onclick="sortAdminTable('name')">프로덕트 <iconify-icon id="icon-sort-name" icon="solar:sort-vertical-linear" class="ml-1"></iconify-icon></th>
                                <th class="px-6 py-3 font-extrabold text-zinc-400 uppercase tracking-widest text-[0.7rem] hidden md:table-cell">엔드포인트</th>
                                <th class="px-6 py-3 font-extrabold text-zinc-400 uppercase tracking-widest text-[0.7rem] text-right rounded-r-xl">제어</th>
                            </tr>
                        </thead>
                        <tbody id="admin-apps-list">
                            <!-- List -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- App Form Modal -->
    <div id="app-form-modal" class="hidden fixed inset-0 z-[105] items-center justify-center p-4 transition-all duration-300 opacity-0 data-[show=true]:opacity-100 data-[show=true]:flex">
        <div class="absolute inset-0 bg-zinc-900/60 backdrop-blur-sm" onclick="closeModal('app-form-modal')"></div>
        <div class="bg-white rounded-[2.5rem] p-10 lg:p-14 w-full max-w-3xl shadow-[0_40px_100px_rgba(0,0,0,0.2)] border border-white flex flex-col relative max-h-[90vh] overflow-y-auto custom-scrollbar transform scale-95 transition-transform duration-300 data-[show=true]:scale-100 z-10">
            <button onclick="closeModal('app-form-modal')" class="absolute top-8 right-8 text-zinc-400 hover:text-zinc-800 transition-colors p-2 rounded-full flex bg-zinc-100 hover:bg-zinc-200"><iconify-icon icon="solar:close-circle-bold-duotone" class="text-2xl"></iconify-icon></button>
            
            <h2 id="form-title" class="text-3xl font-extrabold tracking-tight text-zinc-900 mb-3">시스템 설정</h2>
            <p class="text-[1rem] text-zinc-500 mb-10 font-medium">새로운 업무 모듈의 메타데이터를 작성하세요.</p>

            <form id="app-form" class="space-y-8">
                <input type="hidden" id="form-app-id">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="md:col-span-2">
                        <label class="block text-[0.75rem] font-extrabold text-zinc-400 uppercase tracking-widest mb-3">시스템 명칭 <span class="text-red-500">*</span></label>
                        <input type="text" id="form-name" required placeholder="예: 직원 연차 관리" class="w-full bg-transparent border-b-2 border-zinc-200 py-3 text-2xl font-extrabold text-zinc-900 focus:outline-none focus:border-zinc-900 transition-colors placeholder:text-zinc-300">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-[0.75rem] font-extrabold text-zinc-400 uppercase tracking-widest mb-3">접속 URL <span class="text-red-500">*</span></label>
                        <input type="url" id="form-url" required placeholder="https://" class="w-full bg-zinc-50/50 border border-zinc-200 rounded-2xl px-5 py-4 text-[1rem] text-zinc-900 focus:outline-none focus:ring-4 focus:ring-zinc-900/10 focus:border-zinc-900 transition-all font-mono shadow-inner">
                    </div>

                    <div>
                        <label class="block text-[0.75rem] font-extrabold text-zinc-400 uppercase tracking-widest mb-3">분류 (카테고리)</label>
                        <input type="text" id="form-category" list="category-list" required class="w-full bg-zinc-50/50 border border-zinc-200 rounded-2xl px-5 py-4 text-[1rem] text-zinc-900 focus:outline-none focus:ring-4 focus:ring-zinc-900/10 focus:border-zinc-900 transition-all font-bold">
                        <datalist id="category-list"></datalist>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <label class="block text-[0.75rem] font-extrabold text-zinc-400 uppercase tracking-widest">권장 아이콘</label>
                            <a href="https://icon-sets.iconify.design/solar/" target="_blank" class="text-[0.7rem] font-bold tracking-wide text-brand-green hover:underline flex items-center gap-1"><iconify-icon icon="solar:export-line-duotone"></iconify-icon> Iconify 열기</a>
                        </div>
                        <input type="text" id="form-icon" value="solar:link-circle-bold-duotone" class="w-full bg-zinc-50/50 border border-zinc-200 rounded-2xl px-5 py-4 text-[1rem] focus:outline-none focus:ring-4 focus:ring-zinc-900/10 focus:border-zinc-900 transition-all font-mono text-zinc-500 font-bold">
                    </div>
                </div>

                <div>
                    <label class="block text-[0.75rem] font-extrabold text-zinc-400 uppercase tracking-widest mb-3">요약 설명</label>
                    <textarea id="form-description" rows="3" class="w-full bg-zinc-50/50 border border-zinc-200 rounded-2xl px-5 py-4 text-[1rem] text-zinc-900 focus:outline-none focus:ring-4 focus:ring-zinc-900/10 focus:border-zinc-900 transition-all resize-none shadow-inner" placeholder="이 모듈에 대한 구체적인 기능을 적어주세요"></textarea>
                </div>

                <div class="bg-zinc-50 rounded-[2rem] p-8 space-y-6 border border-zinc-200">
                    <label class="flex items-center gap-4 cursor-pointer group">
                        <div class="relative flex items-center">
                            <input type="checkbox" id="form-is-active" checked class="peer appearance-none w-7 h-7 border-2 border-zinc-300 rounded-[0.4rem] checked:bg-brand-green checked:border-brand-green transition-all cursor-pointer">
                            <iconify-icon icon="solar:check-read-bold" class="absolute text-white left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-lg opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></iconify-icon>
                        </div>
                        <div>
                            <span class="block text-[1.1rem] font-extrabold text-zinc-900">사용자 활성화 유지</span>
                            <span class="text-[0.8rem] text-zinc-500 font-medium">체크 해제 시 점검 모드(클릭 불가)로 전환됩니다.</span>
                        </div>
                    </label>

                    <label class="flex items-center gap-4 cursor-pointer group">
                        <div class="relative flex items-center">
                            <input type="checkbox" id="form-is-locked" onchange="togglePasswordField()" class="peer appearance-none w-7 h-7 border-2 border-zinc-300 rounded-[0.4rem] checked:bg-zinc-900 checked:border-zinc-900 transition-all cursor-pointer">
                            <iconify-icon icon="solar:check-read-bold" class="absolute text-white left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-lg opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></iconify-icon>
                        </div>
                        <div>
                            <span class="block text-[1.1rem] font-extrabold text-zinc-900">링크 보안 잠금</span>
                            <span class="text-[0.8rem] text-zinc-500 font-medium">원클릭 접근을 막고 접속 시 암호를 요구합니다.</span>
                        </div>
                    </label>

                    <div id="password-group" class="hidden pl-11 pt-2 transition-all">
                        <input type="text" id="form-app-password" placeholder="접속 요구 암호 기입" class="w-full bg-white border border-zinc-200 rounded-xl px-4 py-3 text-[1rem] text-zinc-900 focus:outline-none focus:ring-4 focus:ring-zinc-900/10 focus:border-zinc-900 transition-all font-mono font-bold shadow-inner">
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-6">
                    <button type="button" onclick="closeModal('app-form-modal')" class="px-8 py-4 rounded-2xl text-zinc-500 font-bold hover:bg-zinc-100 transition-colors text-[1rem]">취소</button>
                    <button type="submit" id="form-submit-btn" class="rounded-2xl bg-brand-green text-white font-bold py-4 px-10 flex items-center justify-center gap-3 hover:bg-brand-mint transition-all duration-300 hover:shadow-[0_15px_30px_rgba(134,167,137,0.3)] active:scale-[0.98]">
                        <iconify-icon icon="solar:server-square-update-bold-duotone" class="text-xl"></iconify-icon>
                        <span class="text-[1.1rem] tracking-wide">시스템 반영 기록</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
